name: Security - Secrets Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  secrets-scan:
    name: Scan for Hardcoded Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch || 'main' }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Run git-secrets
        run: |
          # Install git-secrets
          git clone https://github.com/awslabs/git-secrets.git /tmp/git-secrets
          cd /tmp/git-secrets && sudo make install
          
          # Configure git-secrets
          git secrets --install
          git secrets --register-aws
          
          # Scan repository
          git secrets --scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

  dependency-check:
    name: Check Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

      - name: Check for outdated packages
        run: npm outdated || true

  env-file-check:
    name: Verify .env Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify .env not committed
        run: |
          if git ls-files | grep -E '^\.env($|\..*$)'; then
            echo "❌ ERROR: Found .env files in git repository!"
            echo "These files should not be committed. Add to .gitignore:"
            git ls-files | grep -E '^\.env($|\..*$)'
            exit 1
          else
            echo "✅ No .env files found in repository"
          fi

      - name: Verify .env.example exists
        run: |
          if [[ ! -f ".env.example" ]]; then
            echo "❌ ERROR: .env.example not found"
            exit 1
          fi
          echo "✅ .env.example found"

      - name: Verify .gitignore contains .env
        run: |
          if ! grep -q "^.env" .gitignore 2>/dev/null; then
            echo "⚠️ WARNING: .env not in .gitignore"
            exit 1
          fi
          echo "✅ .env properly gitignored"
