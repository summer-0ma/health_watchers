version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: health-watchers-mongodb-prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: health_watchers
    ports:
      - "27017:27017"
    volumes:
      - mongodb_prod_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/health_watchers --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - health-watchers-prod

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
      args:
        NODE_ENV: production
    container_name: health-watchers-api-prod
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3001
      MONGO_URI: ${MONGO_URI}
      JWT_ACCESS_TOKEN_SECRET: ${JWT_ACCESS_TOKEN_SECRET}
      JWT_REFRESH_TOKEN_SECRET: ${JWT_REFRESH_TOKEN_SECRET}
      STELLAR_NETWORK: ${STELLAR_NETWORK:-mainnet}
      STELLAR_SECRET_KEY: ${STELLAR_SECRET_KEY}
      STELLAR_PUBLIC_KEY: ${STELLAR_PUBLIC_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - health-watchers-prod

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        NODE_ENV: production
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_STELLAR_NETWORK: ${STELLAR_NETWORK:-mainnet}
    container_name: health-watchers-web-prod
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - health-watchers-prod

  stellar-service:
    build:
      context: .
      dockerfile: apps/stellar-service/Dockerfile.prod
      args:
        NODE_ENV: production
    container_name: health-watchers-stellar-prod
    restart: always
    environment:
      NODE_ENV: production
      STELLAR_NETWORK: ${STELLAR_NETWORK:-mainnet}
      STELLAR_SECRET_KEY: ${STELLAR_SECRET_KEY}
      STELLAR_PUBLIC_KEY: ${STELLAR_PUBLIC_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - health-watchers-prod

volumes:
  mongodb_prod_data:
    driver: local

networks:
  health-watchers-prod:
    driver: bridge
